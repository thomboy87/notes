<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b5bdb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PixelNotes">
<title>PixelNotes</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --bg2: #ede7d9; --bg3: #e3dccf;
  --surface: #ffffff; --surface2: #f9f5ee;
  --border: rgba(0,0,0,0.08);
  --text: #1c1917; --text2: #57534e; --text3: #a8a29e;
  --accent: #3b5bdb; --accent2: #4c6ef5; --accent-soft: rgba(59,91,219,0.12);
  --danger: #e03131; --success: #2f9e44;
  --tag-bg: rgba(59,91,219,0.1);
  --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 16px; --radius-sm: 10px;
  --header-h: 56px; --toolbar-h: 48px; --sidebar-w: 280px;
  --font-ui: 'Sora', sans-serif; --font-note: 'Lora', serif;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #0f0f14; --bg2: #16161f; --bg3: #1e1e2a;
  --surface: #1e1e2a; --surface2: #252533;
  --border: rgba(255,255,255,0.07);
  --text: #f0ede8; --text2: #a09d98; --text3: #5c5955;
  --accent: #748ffc; --accent2: #91a7ff; --accent-soft: rgba(116,143,252,0.15);
  --danger: #ff6b6b; --success: #69db7c;
  --tag-bg: rgba(116,143,252,0.12);
  --shadow: 0 2px 12px rgba(0,0,0,0.4); --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overscroll-behavior: none; transition: background var(--transition), color var(--transition); }

/* ── LAYOUT ── */
#app { display: flex; height: 100dvh; width: 100vw; overflow: hidden; }
#sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100%; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform var(--transition); }
#main { flex: 1; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

/* ── SIDEBAR HEADER ── */
.sidebar-header { padding: 14px 12px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); min-height: var(--header-h); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.sidebar-actions { display: flex; gap: 2px; }
.icon-btn { width: 32px; height: 32px; border: none; background: transparent; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text2); transition: background var(--transition), color var(--transition); flex-shrink: 0; }
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.icon-btn.active { background: var(--accent-soft); color: var(--accent); }

/* ── SEARCH ── */
.search-wrap { padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-box { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 6px 10px; transition: border-color var(--transition), box-shadow var(--transition); }
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search-box input { flex: 1; border: none; background: transparent; outline: none; font-family: var(--font-ui); font-size: 13px; color: var(--text); }
.search-box input::placeholder { color: var(--text3); }

/* ── HOME VIEW TOGGLE ── */
.view-toggle { display: flex; gap: 4px; padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.view-tab { flex: 1; padding: 6px; border: none; background: transparent; border-radius: 7px; font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--text3); cursor: pointer; transition: background var(--transition), color var(--transition); }
.view-tab.active { background: var(--accent-soft); color: var(--accent); }

/* ── SIDEBAR SCROLL ── */
.sidebar-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

/* ── SECTION LABEL ── */
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; color: var(--text3); text-transform: uppercase; padding: 10px 18px 5px; }

/* ── FOLDER ITEMS ── */
.folder-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; margin: 1px 6px; border-radius: 9px; cursor: pointer; font-size: 13px; color: var(--text2); transition: background var(--transition), color var(--transition); user-select: none; }
.folder-item:hover { background: var(--bg3); color: var(--text); }
.folder-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.folder-icon { font-size: 16px; flex-shrink: 0; min-width: 20px; text-align: center; }
.folder-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.folder-count { font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 20px; min-width: 20px; text-align: center; flex-shrink: 0; }
.folder-item.active .folder-count { background: var(--accent); color: #fff; }
.folder-edit-btn { opacity: 0; font-size: 12px; border: none; background: transparent; cursor: pointer; color: var(--text3); padding: 2px 4px; border-radius: 4px; }
.folder-item:hover .folder-edit-btn { opacity: 1; }

/* ── ADD FOLDER BUTTON ── */
.add-folder-btn-inline { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin: 2px 6px; border-radius: 9px; cursor: pointer; font-size: 13px; color: var(--text3); border: 1px dashed var(--border); background: transparent; width: calc(100% - 12px); font-family: var(--font-ui); transition: background var(--transition), color var(--transition), border-color var(--transition); }
.add-folder-btn-inline:hover { background: var(--bg3); color: var(--accent); border-color: var(--accent); }

/* ── TAGS ── */
.tags-container { padding: 4px 8px 12px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--tag-bg); color: var(--accent); border-radius: 6px; padding: 4px 9px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all var(--transition); }
.tag-chip:hover { border-color: var(--accent); }
.tag-chip.active { background: var(--accent); color: #fff; }

/* ── MAIN HEADER ── */
#main-header { padding: 0 14px; height: var(--header-h); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
.folder-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.header-actions { display: flex; gap: 4px; align-items: center; }
.new-note-btn { display: flex; align-items: center; gap: 5px; background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 7px 13px; font-family: var(--font-ui); font-size: 13px; font-weight: 500; cursor: pointer; transition: background var(--transition), transform var(--transition); box-shadow: 0 2px 8px rgba(59,91,219,0.3); white-space: nowrap; }
.new-note-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.new-note-btn:active { transform: translateY(0); }

/* ── SORT DROPDOWN ── */
.sort-dropdown-wrap { position: relative; }
.sort-dropdown { position: absolute; right: 0; top: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; box-shadow: var(--shadow-lg); padding: 5px; min-width: 160px; z-index: 300; animation: fadeIn 0.1s ease; }
.sort-dropdown.hidden { display: none; }
.sort-opt { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--text); transition: background var(--transition); }
.sort-opt:hover { background: var(--bg2); }
.sort-opt.active { color: var(--accent); font-weight: 500; }
.sort-opt .check { margin-left: auto; font-size: 12px; }

/* ── CONTENT AREA ── */
#content-area { flex: 1; display: flex; overflow: hidden; }
#notes-list { width: 300px; min-width: 300px; border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; background: var(--bg); }
#notes-list::-webkit-scrollbar { width: 3px; }
#notes-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

/* ── NOTE CARDS ── */
.note-card { padding: 13px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); position: relative; user-select: none; }
.note-card:hover { background: var(--surface2); }
.note-card.active { background: var(--accent-soft); }
.note-card.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
.note-card-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-card-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; line-height: 1.4; }
.note-card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.note-card-date { font-size: 11px; color: var(--text3); }
.note-card-tag { font-size: 10px; padding: 1px 5px; border-radius: 4px; background: var(--tag-bg); color: var(--accent); font-weight: 500; }
.note-card-folder { font-size: 10px; color: var(--text3); margin-left: auto; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text3); gap: 8px; text-align: center; padding: 32px; }
.empty-icon { font-size: 36px; opacity: 0.4; }

/* ── EDITOR PANE ── */
#editor-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
#editor-pane.empty { align-items: center; justify-content: center; }
.no-note-message { color: var(--text3); font-size: 14px; text-align: center; }
.no-note-message .big { font-size: 44px; display: block; margin-bottom: 10px; }

/* ── EDITOR TOP BAR ── */
.editor-topbar { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); gap: 8px; flex-shrink: 0; min-height: var(--header-h); background: var(--surface); }
.back-btn { display: none; align-items: center; gap: 5px; border: none; background: transparent; color: var(--accent); font-family: var(--font-ui); font-size: 14px; cursor: pointer; padding: 4px 0; font-weight: 500; }

/* ── STICKY TOOLBAR ── */
#editor-toolbar {
  display: flex; align-items: center; gap: 2px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap; overflow-x: auto;
  background: var(--surface);
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 10;
  -webkit-overflow-scrolling: touch;
}
#editor-toolbar::-webkit-scrollbar { display: none; }
.toolbar-group { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
.toolbar-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
.tb-btn { width: 32px; height: 32px; border: none; background: transparent; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text2); transition: background var(--transition), color var(--transition); font-family: var(--font-ui); flex-shrink: 0; }
.tb-btn:hover { background: var(--bg2); color: var(--text); }
.tb-btn.active { background: var(--accent-soft); color: var(--accent); }
.tb-select { border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font-ui); font-size: 11px; padding: 4px 5px; border-radius: 6px; cursor: pointer; outline: none; flex-shrink: 0; max-width: 80px; }
.font-size-select { max-width: 58px; }

/* ── NOTE TITLE ── */
.note-title-wrap { padding: 14px 18px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.note-title-input { width: 100%; border: none; outline: none; font-family: var(--font-ui); font-size: 20px; font-weight: 600; color: var(--text); background: transparent; letter-spacing: -0.3px; }
.note-title-input::placeholder { color: var(--text3); }

/* ── META BAR ── */
.note-meta-bar { display: flex; align-items: center; gap: 8px; padding: 6px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; background: var(--surface); }
.note-date { font-size: 11px; color: var(--text3); }
.folder-select { border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-family: var(--font-ui); font-size: 11px; padding: 3px 6px; border-radius: 6px; cursor: pointer; outline: none; }
.tag-input-wrap { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; flex: 1; }
.inline-tag { font-size: 11px; padding: 2px 6px; background: var(--tag-bg); color: var(--accent); border-radius: 5px; display: flex; align-items: center; gap: 3px; font-weight: 500; }
.inline-tag button { border: none; background: transparent; cursor: pointer; color: var(--accent); font-size: 11px; padding: 0; line-height: 1; }
.tag-add-input { border: none; outline: none; background: transparent; font-family: var(--font-ui); font-size: 11px; color: var(--text); width: 80px; min-width: 40px; }
.tag-add-input::placeholder { color: var(--text3); }

/* ── EDITOR BODY ── */
#editor-content-wrap { flex: 1; overflow-y: auto; padding: 16px 18px 80px; }
#editor-content-wrap::-webkit-scrollbar { width: 3px; }
#editor-content-wrap::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
#editor-body { min-height: 300px; outline: none; font-family: var(--font-note); font-size: 16px; line-height: 1.8; color: var(--text); word-break: break-word; }
#editor-body:empty::before { content: attr(data-placeholder); color: var(--text3); font-style: italic; pointer-events: none; }
#editor-body h1 { font-size: 1.8em; font-weight: 600; margin: 0.8em 0 0.4em; letter-spacing: -0.3px; font-family: var(--font-ui); }
#editor-body h2 { font-size: 1.4em; font-weight: 600; margin: 0.7em 0 0.3em; font-family: var(--font-ui); }
#editor-body h3 { font-size: 1.15em; font-weight: 600; margin: 0.6em 0 0.2em; font-family: var(--font-ui); }
#editor-body p { margin-bottom: 0.5em; }
#editor-body ul, #editor-body ol { padding-left: 1.5em; margin-bottom: 0.6em; }
#editor-body li { margin-bottom: 0.2em; }
#editor-body blockquote { border-left: 3px solid var(--accent); margin: 0.8em 0; padding: 6px 16px; color: var(--text2); font-style: italic; background: var(--accent-soft); border-radius: 0 8px 8px 0; }
#editor-body a { color: var(--accent); text-decoration: none; }
#editor-body code { font-family: 'SF Mono','Fira Code',monospace; background: var(--bg2); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; }
#editor-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

/* ── CHECKLIST — fixed alignment ── */
.checklist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  min-height: 24px;
}
.checklist-item input[type="checkbox"] {
  width: 16px; height: 16px;
  flex-shrink: 0;
  margin: 0;
  cursor: pointer;
  accent-color: var(--accent);
  position: relative;
  top: 0;
}
.checklist-item span {
  flex: 1;
  font-family: var(--font-note);
  font-size: 16px;
  line-height: 1.5;
  outline: none;
  min-height: 1em;
  vertical-align: middle;
}
.checklist-item.done span { color: var(--text3); text-decoration: line-through; }

/* ── STATUS BAR ── */
#editor-statusbar { display: flex; align-items: center; gap: 10px; padding: 4px 14px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); background: var(--surface); flex-shrink: 0; }
.status-saved { color: var(--success); }
.status-saving { color: var(--text3); }
#voice-btn { margin-left: auto; display: flex; align-items: center; gap: 5px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-family: var(--font-ui); font-size: 11px; padding: 3px 8px; border-radius: 6px; transition: background var(--transition), color var(--transition); }
#voice-btn:hover { background: var(--bg2); color: var(--text); }
#voice-btn.recording { color: var(--danger); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); animation: fadeIn 0.15s ease; }
.modal-overlay.hidden { display: none; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
.modal { background: var(--surface); border-radius: var(--radius); padding: 22px; width: 100%; max-width: 360px; box-shadow: var(--shadow-lg); animation: slideUp 0.2s ease; }
@keyframes slideUp { from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1} }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.modal-input { width: 100%; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-family: var(--font-ui); font-size: 14px; padding: 9px 12px; border-radius: 10px; outline: none; transition: border-color var(--transition); margin-bottom: 10px; }
.modal-input:focus { border-color: var(--accent); }
.modal-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.btn-secondary { border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font-ui); font-size: 13px; padding: 8px 15px; border-radius: 9px; cursor: pointer; }
.btn-secondary:hover { background: var(--bg2); }
.btn-primary { border: none; background: var(--accent); color: #fff; font-family: var(--font-ui); font-size: 13px; font-weight: 500; padding: 8px 15px; border-radius: 9px; cursor: pointer; }
.btn-primary:hover { background: var(--accent2); }
.btn-danger { border: none; background: var(--danger); color: #fff; font-family: var(--font-ui); font-size: 13px; font-weight: 500; padding: 8px 15px; border-radius: 9px; cursor: pointer; }

/* Emoji picker row */
.emoji-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.emoji-opt { font-size: 20px; padding: 6px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color var(--transition), background var(--transition); }
.emoji-opt:hover { background: var(--bg2); }
.emoji-opt.selected { border-color: var(--accent); background: var(--accent-soft); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: var(--bg); padding: 9px 18px; border-radius: 22px; font-size: 13px; font-weight: 500; z-index: 9999; pointer-events: none; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; opacity: 0; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── UNDO BAR ── */
#undo-bar { position: fixed; bottom: 24px; right: 20px; z-index: 900; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text2); box-shadow: var(--shadow-lg); transform: translateY(60px); opacity: 0; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; pointer-events: none; }
#undo-bar.show { transform: translateY(0); opacity: 1; pointer-events: all; }
#undo-bar button { border: none; background: transparent; color: var(--accent); font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; }

/* ── CONTEXT MENU ── */
.context-menu { position: fixed; z-index: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; box-shadow: var(--shadow-lg); padding: 5px; min-width: 160px; animation: fadeIn 0.1s ease; }
.context-menu.hidden { display: none; }
.ctx-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--text); transition: background var(--transition); }
.ctx-item:hover { background: var(--bg2); }
.ctx-item.danger { color: var(--danger); }

/* ── INSTALL BANNER ── */
#install-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: #fff; padding: 12px 18px; z-index: 800; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); }
#install-banner.visible { display: flex; }
#install-banner button { border: none; background: rgba(255,255,255,0.2); color: #fff; font-family: var(--font-ui); font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 8px; cursor: pointer; }
#install-banner .dismiss { background: transparent; font-size: 18px; padding: 4px 8px; margin-left: auto; }

/* ── MOBILE ── */
#mobile-nav-btn { display: none; width: 34px; height: 34px; border: none; background: transparent; border-radius: 7px; cursor: pointer; font-size: 18px; color: var(--text2); align-items: center; justify-content: center; }
#sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.4); }

/* Search highlight */
mark { background: rgba(255,210,60,0.5); border-radius: 2px; padding: 0 1px; }
[data-theme="dark"] mark { background: rgba(255,200,0,0.3); }
.search-highlight { background: rgba(255,180,0,0.4); border-radius: 2px; }

@media (max-width: 900px) {
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); z-index: 200; }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay.visible { display: block; }
  #mobile-nav-btn { display: flex; }
  #notes-list { width: 100%; min-width: 0; border-right: none; }
  #editor-pane { position: fixed; inset: 0; z-index: 50; transform: translateX(100%); transition: transform var(--transition); background: var(--surface); display: flex; flex-direction: column; }
  #editor-pane.open { transform: translateX(0); }
  #content-area { display: block; height: 100%; }
  .back-btn { display: flex !important; }
  #editor-toolbar { position: sticky; top: 0; }
}
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">📝</div>
        <span class="logo-text">PixelNotes</span>
      </div>
      <div class="sidebar-actions">
        <button class="icon-btn" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </div>

    <!-- Home view toggle: Folders vs Notes -->
    <div class="view-toggle">
      <button class="view-tab active" id="view-folders-btn">📁 Folders</button>
      <button class="view-tab" id="view-notes-btn">📋 All Notes</button>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <span style="color:var(--text3);font-size:13px;">🔍</span>
        <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off" spellcheck="false">
        <button class="icon-btn" id="clear-search" style="display:none;width:18px;height:18px;font-size:11px;">✕</button>
      </div>
    </div>

    <div class="sidebar-scroll">
      <!-- FOLDERS VIEW -->
      <div id="folders-view">
        <div class="section-label">Folders</div>
        <div id="folders-list"></div>
        <button class="add-folder-btn-inline" id="add-folder-btn">＋ New Folder</button>
        <div class="section-label" style="margin-top:8px;">Tags</div>
        <div class="tags-container" id="all-tags"></div>
      </div>
      <!-- NOTES VIEW (all notes flat list in sidebar) -->
      <div id="notes-view" style="display:none;">
        <div class="section-label">All Notes</div>
        <div id="sidebar-notes-list"></div>
      </div>
    </div>
  </aside>
  <div id="sidebar-overlay"></div>

  <!-- MAIN -->
  <main id="main">
    <div id="main-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="mobile-nav-btn">☰</button>
        <span class="folder-title" id="current-folder-title">All Notes</span>
      </div>
      <div class="header-actions">
        <div class="sort-dropdown-wrap">
          <button class="icon-btn" id="sort-btn" title="Sort">⇅</button>
          <div class="sort-dropdown hidden" id="sort-dropdown">
            <div class="sort-opt" data-sort="modified">🕐 Last Modified <span class="check"></span></div>
            <div class="sort-opt" data-sort="created">📅 Date Created <span class="check"></span></div>
            <div class="sort-opt" data-sort="alpha">🔤 A – Z <span class="check"></span></div>
          </div>
        </div>
        <button class="new-note-btn" id="new-note-btn">＋ New Note</button>
      </div>
    </div>
    <div id="content-area">
      <div id="notes-list">
        <div class="empty-state" id="empty-state" style="display:none;">
          <div class="empty-icon">📄</div>
          <p style="font-size:13px;">No notes yet.<br>Tap <strong>+ New Note</strong> to start.</p>
        </div>
      </div>

      <!-- EDITOR -->
      <div id="editor-pane" class="empty">
        <div class="no-note-message" id="no-note-msg">
          <span class="big">✏️</span>
          Select a note or create a new one
        </div>
        <div id="editor-inner" style="display:none;flex-direction:column;height:100%;width:100%;overflow:hidden;">
          <div class="editor-topbar">
            <button class="back-btn" id="back-btn">‹ Back</button>
            <div style="flex:1;"></div>
            <button class="icon-btn" id="delete-note-btn" style="color:var(--danger)">🗑</button>
          </div>

          <!-- STICKY TOOLBAR -->
          <div id="editor-toolbar">
            <div class="toolbar-group">
              <select class="tb-select" id="format-block">
                <option value="p">Body</option>
                <option value="h1">H1</option>
                <option value="h2">H2</option>
                <option value="h3">H3</option>
                <option value="blockquote">Quote</option>
              </select>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
              <select class="tb-select font-size-select" id="font-size-select">
                <option value="12px">12</option>
                <option value="14px">14</option>
                <option value="16px" selected>16</option>
                <option value="18px">18</option>
                <option value="20px">20</option>
                <option value="24px">24</option>
              </select>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
              <button class="tb-btn" data-cmd="bold" title="Bold"><b>B</b></button>
              <button class="tb-btn" data-cmd="italic" title="Italic"><i>I</i></button>
              <button class="tb-btn" data-cmd="underline" title="Underline"><u>U</u></button>
              <button class="tb-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
              <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list">•≡</button>
              <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered list">1≡</button>
              <button class="tb-btn" id="checklist-btn" title="Checklist">☑</button>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
              <button class="tb-btn" data-cmd="undo" title="Undo">↩</button>
              <button class="tb-btn" data-cmd="redo" title="Redo">↪</button>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
              <button class="tb-btn" id="hr-btn" title="Divider">━</button>
            </div>
          </div>

          <div class="note-title-wrap">
            <input type="text" id="note-title" class="note-title-input" placeholder="Note title…" autocomplete="off">
          </div>
          <div class="note-meta-bar">
            <span class="note-date" id="note-date"></span>
            <select class="folder-select" id="note-folder-select"></select>
            <div class="tag-input-wrap" id="tag-input-wrap">
              <input type="text" class="tag-add-input" id="tag-add-input" placeholder="＋ tag…" maxlength="20">
            </div>
          </div>
          <div id="editor-content-wrap">
            <div id="editor-body" contenteditable="true" data-placeholder="Start writing…"></div>
          </div>
          <div id="editor-statusbar">
            <span id="save-status" class="status-saved">✓ Saved</span>
            <span id="word-count">0 words</span>
            <button id="voice-btn">🎙 Voice</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Install Banner -->
<div id="install-banner">
  <span>📲 Install PixelNotes as an app</span>
  <button id="install-btn">Install</button>
  <button class="dismiss" id="dismiss-install">✕</button>
</div>

<!-- FOLDER MODAL -->
<div class="modal-overlay hidden" id="folder-modal">
  <div class="modal">
    <div class="modal-title" id="folder-modal-title">New Folder</div>
    <label class="modal-label">Choose an icon</label>
    <div class="emoji-row" id="emoji-row"></div>
    <label class="modal-label">Or type a custom emoji</label>
    <input type="text" class="modal-input" id="folder-emoji-custom" placeholder="e.g. 🚀" maxlength="2" style="width:70px;text-align:center;font-size:20px;margin-bottom:12px;">
    <label class="modal-label">Folder name</label>
    <input type="text" class="modal-input" id="folder-name-input" placeholder="Folder name…" maxlength="30">
    <div class="modal-actions">
      <button class="btn-secondary" id="folder-cancel">Cancel</button>
      <button class="btn-primary" id="folder-save">Save</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal">
    <div class="modal-title">Delete Note</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:14px;">Delete <strong id="delete-note-name"></strong>?</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="delete-cancel">Cancel</button>
      <button class="btn-danger" id="delete-confirm">Delete</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu hidden" id="context-menu">
  <div class="ctx-item" id="ctx-rename">✏️ Rename</div>
  <div class="ctx-item" id="ctx-move">📁 Move to folder</div>
  <div class="ctx-item danger" id="ctx-delete">🗑 Delete</div>
</div>

<div id="toast"></div>
<div id="undo-bar"><span id="undo-msg">Note deleted</span><button id="undo-btn">Undo</button></div>

<script>
// ═══════════════════════════════════════════════════════
//  PixelNotes v2 — Private. Offline. Yours.
//  Zero tracking. Zero backdoors. All data in localStorage.
// ═══════════════════════════════════════════════════════

const DB_KEY = 'pixelnotes_v2';

// Default folders with emoji
const DEFAULT_FOLDERS = [
  { id: 'personal', name: 'Personal', icon: '🏠' },
  { id: 'work',     name: 'Work',     icon: '💼' },
  { id: 'ideas',    name: 'Ideas',    icon: '💡' },
];

let state = {
  notes: [],
  folders: DEFAULT_FOLDERS,
  activeFolder: '__all__',
  activeNoteId: null,
  search: '',
  activeTag: null,
  sort: 'modified',
  theme: 'auto',
  homeView: 'folders', // 'folders' | 'notes'
  undoStack: [],
  editingFolderId: null,
};

// ── PERSISTENCE (localStorage only — no network, no tracking) ──
function save() {
  try { localStorage.setItem(DB_KEY, JSON.stringify({ notes: state.notes, folders: state.folders, theme: state.theme, sort: state.sort, homeView: state.homeView })); } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(DB_KEY) || 'null');
    if (d) {
      state.notes = d.notes || [];
      state.folders = d.folders || DEFAULT_FOLDERS;
      state.theme = d.theme || 'auto';
      state.sort = d.sort || 'modified';
      state.homeView = d.homeView || 'folders';
    }
  } catch(e) {}
}

// ── THEME ──
const themeBtn = document.getElementById('theme-toggle');
function applyTheme() {
  const dark = state.theme === 'dark' || (state.theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.textContent = dark ? '☀️' : '🌙';
}
themeBtn.addEventListener('click', () => { const dark = document.documentElement.getAttribute('data-theme') === 'dark'; state.theme = dark ? 'light' : 'dark'; applyTheme(); save(); });
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (state.theme === 'auto') applyTheme(); });

// ── UTILS ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(ts) { const d = new Date(ts), now = new Date(); if (d.toDateString() === now.toDateString()) return 'Today ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); const y = new Date(now); y.setDate(now.getDate()-1); if (d.toDateString() === y.toDateString()) return 'Yesterday'; return d.toLocaleDateString([], {month:'short',day:'numeric'}); }
function plainText(html) { const d = document.createElement('div'); d.innerHTML = html; return d.textContent; }
function wordCount(html) { const t = plainText(html).trim(); return t ? t.split(/\s+/).length : 0; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlight(text, q) { if (!q) return escHtml(text); return escHtml(text).replace(new RegExp(escRe(q), 'gi'), m => `<mark>${m}</mark>`); }
function getFolderById(id) { return state.folders.find(f => f.id === id); }
function getFolderIcon(id) { const f = getFolderById(id); return f ? f.icon : '📁'; }
function getFolderName(id) { const f = getFolderById(id); return f ? f.name : id; }

// ── NOTES CRUD ──
function newNote() {
  const folderId = state.activeFolder === '__all__' ? (state.folders[0]?.id || 'personal') : state.activeFolder;
  const note = { id: uid(), title: '', body: '', folderId, tags: [], created: Date.now(), modified: Date.now() };
  state.notes.unshift(note);
  save(); render(); openNote(note.id);
}
function deleteNote(id) {
  const idx = state.notes.findIndex(n => n.id === id);
  if (idx === -1) return;
  const removed = state.notes.splice(idx, 1)[0];
  state.undoStack.push({ type: 'delete', note: removed, idx });
  if (state.activeNoteId === id) state.activeNoteId = null;
  save(); render(); showUndoBar('Note deleted');
}
function undoDelete() {
  const action = state.undoStack.pop();
  if (!action) return;
  if (action.type === 'delete') { state.notes.splice(action.idx, 0, action.note); save(); render(); openNote(action.note.id); }
  hideUndoBar();
}

// ── HOME VIEW TOGGLE ──
document.getElementById('view-folders-btn').addEventListener('click', () => { state.homeView = 'folders'; save(); applyHomeView(); });
document.getElementById('view-notes-btn').addEventListener('click', () => { state.homeView = 'notes'; save(); applyHomeView(); });
function applyHomeView() {
  const isFolders = state.homeView === 'folders';
  document.getElementById('folders-view').style.display = isFolders ? '' : 'none';
  document.getElementById('notes-view').style.display = isFolders ? 'none' : '';
  document.getElementById('view-folders-btn').classList.toggle('active', isFolders);
  document.getElementById('view-notes-btn').classList.toggle('active', !isFolders);
  if (!isFolders) renderSidebarNotesList();
}
function renderSidebarNotesList() {
  const el = document.getElementById('sidebar-notes-list');
  const notes = filteredNotes();
  if (!notes.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><p style="font-size:12px;">No notes</p></div>'; return; }
  el.innerHTML = notes.map(n => `<div class="folder-item${state.activeNoteId===n.id?' active':''}" data-noteid="${n.id}"><span class="folder-icon">📄</span><span class="folder-label">${escHtml(n.title||'Untitled')}</span><span class="folder-count" style="font-size:10px;">${fmtDate(n.modified)}</span></div>`).join('');
  el.querySelectorAll('[data-noteid]').forEach(el => el.addEventListener('click', () => { openNote(el.dataset.noteid); closeSidebar(); }));
}

// ── FOLDERS ──
const FOLDER_EMOJIS = ['📁','🏠','💼','💡','⭐','🎯','📚','🎨','🏋️','✈️','🎵','💰','🔬','🌿','❤️','🔥','⚡','🌊','🎮','📷'];
let selectedEmoji = '📁';

function openFolderModal(folderId = null) {
  state.editingFolderId = folderId;
  const folder = folderId ? getFolderById(folderId) : null;
  document.getElementById('folder-modal-title').textContent = folderId ? 'Edit Folder' : 'New Folder';
  document.getElementById('folder-name-input').value = folder ? folder.name : '';
  selectedEmoji = folder ? folder.icon : '📁';
  document.getElementById('folder-emoji-custom').value = '';
  // Render emoji grid
  const row = document.getElementById('emoji-row');
  row.innerHTML = FOLDER_EMOJIS.map(e => `<span class="emoji-opt${e===selectedEmoji?' selected':''}" data-emoji="${e}">${e}</span>`).join('');
  row.querySelectorAll('.emoji-opt').forEach(el => {
    el.addEventListener('click', () => {
      selectedEmoji = el.dataset.emoji;
      row.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('folder-emoji-custom').value = '';
    });
  });
  document.getElementById('folder-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('folder-name-input').focus(), 50);
}
document.getElementById('folder-emoji-custom').addEventListener('input', e => {
  const v = e.target.value.trim();
  if (v) { selectedEmoji = v; document.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected')); }
});
document.getElementById('add-folder-btn').addEventListener('click', () => openFolderModal());
document.getElementById('folder-cancel').addEventListener('click', () => document.getElementById('folder-modal').classList.add('hidden'));
document.getElementById('folder-save').addEventListener('click', () => {
  const name = document.getElementById('folder-name-input').value.trim();
  if (!name) return;
  const icon = document.getElementById('folder-emoji-custom').value.trim() || selectedEmoji;
  if (state.editingFolderId) {
    const f = getFolderById(state.editingFolderId);
    if (f) { f.name = name; f.icon = icon; }
  } else {
    const id = uid();
    state.folders.push({ id, name, icon });
  }
  save(); render();
  document.getElementById('folder-modal').classList.add('hidden');
  showToast(state.editingFolderId ? 'Folder updated' : 'Folder created: ' + name);
  state.editingFolderId = null;
});
document.getElementById('folder-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('folder-save').click(); });

function renderFolders() {
  const el = document.getElementById('folders-list');
  const allCount = state.notes.length;
  const items = [
    { id: '__all__', icon: '📋', name: 'All Notes', count: allCount, system: true },
    ...state.folders.map(f => ({ ...f, count: state.notes.filter(n => n.folderId === f.id).length, system: false }))
  ];
  el.innerHTML = items.map(f => `
    <div class="folder-item${state.activeFolder === f.id ? ' active' : ''}" data-folder="${f.id}">
      <span class="folder-icon">${f.icon}</span>
      <span class="folder-label">${escHtml(f.name)}</span>
      ${!f.system ? `<button class="folder-edit-btn" data-edit="${f.id}" title="Edit">✏️</button>` : ''}
      <span class="folder-count">${f.count}</span>
    </div>`).join('');
  el.querySelectorAll('.folder-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('.folder-edit-btn')) return;
      state.activeFolder = item.dataset.folder;
      state.activeTag = null;
      closeSidebar(); render();
    });
  });
  el.querySelectorAll('.folder-edit-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); openFolderModal(btn.dataset.edit); });
  });
  document.getElementById('current-folder-title').textContent = state.activeFolder === '__all__' ? 'All Notes' : (getFolderName(state.activeFolder) || 'Notes');
}

function renderAllTags() {
  const tags = {};
  state.notes.forEach(n => (n.tags||[]).forEach(t => { tags[t] = (tags[t]||0)+1; }));
  const el = document.getElementById('all-tags');
  if (!Object.keys(tags).length) { el.innerHTML = '<span style="font-size:11px;color:var(--text3);padding:4px 8px;">No tags yet</span>'; return; }
  el.innerHTML = Object.entries(tags).map(([t,c]) => `<span class="tag-chip${state.activeTag===t?' active':''}" data-tag="${t}">#${t} <small>${c}</small></span>`).join('');
  el.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => { state.activeTag = state.activeTag === chip.dataset.tag ? null : chip.dataset.tag; state.activeFolder = '__all__'; closeSidebar(); render(); });
  });
}

// ── FILTERED NOTES ──
function filteredNotes() {
  let notes = state.notes.slice();
  if (state.activeFolder !== '__all__') notes = notes.filter(n => n.folderId === state.activeFolder);
  if (state.activeTag) notes = notes.filter(n => (n.tags||[]).includes(state.activeTag));
  if (state.search) { const q = state.search.toLowerCase(); notes = notes.filter(n => n.title.toLowerCase().includes(q) || plainText(n.body).toLowerCase().includes(q)); }
  if (state.sort === 'alpha') notes.sort((a,b) => (a.title||'').localeCompare(b.title||''));
  else if (state.sort === 'created') notes.sort((a,b) => b.created - a.created);
  else notes.sort((a,b) => b.modified - a.modified);
  return notes;
}

// ── NOTES LIST ──
function renderNotesList() {
  const list = document.getElementById('notes-list');
  const empty = document.getElementById('empty-state');
  const notes = filteredNotes();
  const q = state.search;
  list.querySelectorAll('.note-card').forEach(el => el.remove());
  if (!notes.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  notes.forEach(note => {
    const card = document.createElement('div');
    card.className = 'note-card' + (state.activeNoteId === note.id ? ' active' : '');
    card.dataset.id = note.id;
    const preview = plainText(note.body).slice(0, 80);
    const tagsHtml = (note.tags||[]).slice(0,3).map(t => `<span class="note-card-tag">#${t}</span>`).join('');
    const folderIcon = getFolderIcon(note.folderId);
    card.innerHTML = `
      <div class="note-card-title">${highlight(note.title||'Untitled', q)}</div>
      <div class="note-card-preview">${highlight(preview||'—', q)}</div>
      <div class="note-card-meta">
        <span class="note-card-date">${fmtDate(note.modified)}</span>
        <span style="font-size:12px;">${folderIcon}</span>
        <div style="display:flex;gap:3px;flex-wrap:wrap;">${tagsHtml}</div>
      </div>`;
    card.addEventListener('click', () => openNote(note.id));
    card.addEventListener('contextmenu', e => { e.preventDefault(); showContextMenu(e, note.id); });
    list.appendChild(card);
  });
}

// ── SORT DROPDOWN ──
document.getElementById('sort-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('sort-dropdown').classList.toggle('hidden');
  updateSortUI();
});
document.querySelectorAll('.sort-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    state.sort = opt.dataset.sort;
    save(); render();
    document.getElementById('sort-dropdown').classList.add('hidden');
    showToast('Sorted by: ' + opt.textContent.trim().replace(/✓/,'').trim());
  });
});
function updateSortUI() {
  document.querySelectorAll('.sort-opt').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.sort === state.sort);
    opt.querySelector('.check').textContent = opt.dataset.sort === state.sort ? '✓' : '';
  });
}
document.addEventListener('click', () => document.getElementById('sort-dropdown').classList.add('hidden'));

// ── OPEN NOTE ──
let saveTimeout = null;
let currentSearchTerm = '';

function openNote(id) {
  const note = state.notes.find(n => n.id === id);
  if (!note) return;
  state.activeNoteId = id;
  const pane = document.getElementById('editor-pane');
  pane.classList.remove('empty');
  document.getElementById('no-note-msg').style.display = 'none';
  const inner = document.getElementById('editor-inner');
  inner.style.display = 'flex';
  document.getElementById('note-title').value = note.title;
  document.getElementById('editor-body').innerHTML = note.body;
  document.getElementById('note-date').textContent = 'Modified ' + fmtDate(note.modified);
  updateWordCount();
  renderNoteFolderSelect(note);
  renderNoteTags(note);
  pane.classList.add('open');
  renderNotesList();
  // Highlight search term inside note
  if (state.search) {
    currentSearchTerm = state.search;
    setTimeout(() => highlightInEditor(state.search), 50);
  }
}

// ── SEARCH HIGHLIGHT INSIDE EDITOR ──
function highlightInEditor(term) {
  if (!term) return;
  const body = document.getElementById('editor-body');
  // Use browser's find-in-page style: wrap matches in mark tags
  const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => {
    const idx = node.textContent.toLowerCase().indexOf(term.toLowerCase());
    if (idx === -1) return;
    const mark = document.createElement('mark');
    const after = node.splitText(idx);
    after.splitText(term.length);
    const middle = after.cloneNode(true);
    mark.appendChild(middle);
    after.parentNode.replaceChild(mark, after);
  });
  // Scroll to first match
  const first = body.querySelector('mark');
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderNoteFolderSelect(note) {
  const sel = document.getElementById('note-folder-select');
  sel.innerHTML = state.folders.map(f => `<option value="${f.id}"${f.id===note.folderId?' selected':''}>${f.icon} ${f.name}</option>`).join('');
}
function renderNoteTags(note) {
  const wrap = document.getElementById('tag-input-wrap');
  wrap.querySelectorAll('.inline-tag').forEach(el => el.remove());
  (note.tags||[]).forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'inline-tag';
    chip.innerHTML = `#${tag} <button data-tag="${tag}">✕</button>`;
    chip.querySelector('button').addEventListener('click', () => removeTag(note.id, tag));
    wrap.insertBefore(chip, document.getElementById('tag-add-input'));
  });
}
function removeTag(noteId, tag) {
  const note = state.notes.find(n => n.id === noteId);
  if (!note) return;
  note.tags = (note.tags||[]).filter(t => t !== tag);
  note.modified = Date.now();
  save(); renderNoteTags(note); renderAllTags(); renderNotesList();
}
function updateWordCount() { document.getElementById('word-count').textContent = wordCount(document.getElementById('editor-body').innerHTML) + ' words'; }

// ── AUTO SAVE ──
function scheduleSave() {
  const status = document.getElementById('save-status');
  status.textContent = '● Saving…'; status.className = 'status-saving';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => { commitEditorToNote(); status.textContent = '✓ Saved'; status.className = 'status-saved'; }, 600);
}
function commitEditorToNote() {
  const note = state.notes.find(n => n.id === state.activeNoteId);
  if (!note) return;
  note.title = document.getElementById('note-title').value.trim();
  note.body = document.getElementById('editor-body').innerHTML;
  note.modified = Date.now();
  save(); renderNotesList(); renderFolders();
}

// ── EDITOR EVENTS ──
document.getElementById('note-title').addEventListener('input', scheduleSave);
document.getElementById('editor-body').addEventListener('input', () => { updateWordCount(); scheduleSave(); });
document.getElementById('note-folder-select').addEventListener('change', e => {
  const note = state.notes.find(n => n.id === state.activeNoteId);
  if (!note) return;
  note.folderId = e.target.value; note.modified = Date.now();
  save(); render();
});

// ── TAG INPUT — also creates folder if new tag ──
const tagInput = document.getElementById('tag-add-input');
tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = tagInput.value.trim().replace(/^#/,'').toLowerCase().replace(/\s+/g,'-');
    if (!val) return;
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (!note) return;
    if (!(note.tags||[]).includes(val)) {
      note.tags = [...(note.tags||[]), val];
      note.modified = Date.now();
      // Auto-create folder if tag doesn't match existing folder name
      const exists = state.folders.some(f => f.name.toLowerCase() === val);
      if (!exists) {
        state.folders.push({ id: uid(), name: val.charAt(0).toUpperCase() + val.slice(1), icon: '🏷️' });
        showToast('Tag + folder created: ' + val);
      }
      save(); renderNoteTags(note); renderAllTags(); renderFolders(); renderNotesList();
    }
    tagInput.value = '';
  }
  if (e.key === 'Backspace' && !tagInput.value) {
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (note && note.tags && note.tags.length) { note.tags.pop(); note.modified = Date.now(); save(); renderNoteTags(note); renderAllTags(); }
  }
});

// ── TOOLBAR ──
document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn => {
  btn.addEventListener('mousedown', e => { e.preventDefault(); document.execCommand(btn.dataset.cmd, false, null); updateToolbarState(); });
});
document.getElementById('format-block').addEventListener('change', e => { document.execCommand('formatBlock', false, e.target.value); updateToolbarState(); });
document.getElementById('font-size-select').addEventListener('change', e => { document.execCommand('fontSize', false, '7'); const els = document.getElementById('editor-body').querySelectorAll('font[size="7"]'); els.forEach(el => { el.removeAttribute('size'); el.style.fontSize = e.target.value; }); scheduleSave(); });
document.getElementById('checklist-btn').addEventListener('mousedown', e => { e.preventDefault(); insertChecklist(); });
document.getElementById('hr-btn').addEventListener('mousedown', e => { e.preventDefault(); document.execCommand('insertHorizontalRule', false, null); });

function insertChecklist() {
  const item = document.createElement('div');
  item.className = 'checklist-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  const span = document.createElement('span');
  span.contentEditable = 'true';
  span.textContent = '';
  item.appendChild(cb);
  item.appendChild(span);
  cb.addEventListener('change', () => { item.classList.toggle('done', cb.checked); scheduleSave(); });
  const sel = window.getSelection();
  if (sel && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.collapse(false);
    range.insertNode(item);
    const newRange = document.createRange();
    newRange.setStart(span, 0); newRange.collapse(true);
    sel.removeAllRanges(); sel.addRange(newRange);
  } else {
    document.getElementById('editor-body').appendChild(item);
  }
  span.focus();
  scheduleSave();
}

function updateToolbarState() {
  ['bold','italic','underline','strikeThrough','insertUnorderedList','insertOrderedList'].forEach(cmd => {
    const btn = document.querySelector(`.tb-btn[data-cmd="${cmd}"]`);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}
document.getElementById('editor-body').addEventListener('keyup', updateToolbarState);
document.getElementById('editor-body').addEventListener('mouseup', updateToolbarState);

// ── SEARCH ──
const searchInput = document.getElementById('search-input');
const clearSearch = document.getElementById('clear-search');
searchInput.addEventListener('input', () => {
  state.search = searchInput.value.trim();
  clearSearch.style.display = state.search ? 'flex' : 'none';
  renderNotesList();
  if (state.homeView === 'notes') renderSidebarNotesList();
});
clearSearch.addEventListener('click', () => { searchInput.value = ''; state.search = ''; clearSearch.style.display = 'none'; renderNotesList(); });

// ── NEW NOTE ──
document.getElementById('new-note-btn').addEventListener('click', newNote);

// ── DELETE ──
document.getElementById('delete-note-btn').addEventListener('click', () => {
  const note = state.notes.find(n => n.id === state.activeNoteId);
  if (!note) return;
  document.getElementById('delete-note-name').textContent = note.title || 'Untitled';
  document.getElementById('delete-modal').classList.remove('hidden');
});
document.getElementById('delete-cancel').addEventListener('click', () => document.getElementById('delete-modal').classList.add('hidden'));
document.getElementById('delete-confirm').addEventListener('click', () => {
  document.getElementById('delete-modal').classList.add('hidden');
  const id = state.activeNoteId;
  closeEditor(); deleteNote(id);
});
function closeEditor() {
  state.activeNoteId = null;
  const pane = document.getElementById('editor-pane');
  pane.classList.add('empty'); pane.classList.remove('open');
  document.getElementById('no-note-msg').style.display = '';
  document.getElementById('editor-inner').style.display = 'none';
}

// ── CONTEXT MENU ──
let ctxNoteId = null;
function showContextMenu(e, noteId) {
  ctxNoteId = noteId;
  const menu = document.getElementById('context-menu');
  menu.classList.remove('hidden');
  const x = Math.min(e.clientX, window.innerWidth - 170);
  const y = Math.min(e.clientY, window.innerHeight - 120);
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
}
document.addEventListener('click', () => document.getElementById('context-menu').classList.add('hidden'));
document.getElementById('ctx-delete').addEventListener('click', () => { if (ctxNoteId) { if (state.activeNoteId === ctxNoteId) closeEditor(); deleteNote(ctxNoteId); } });
document.getElementById('ctx-rename').addEventListener('click', () => { if (!ctxNoteId) return; openNote(ctxNoteId); setTimeout(() => { const t = document.getElementById('note-title'); t.focus(); t.select(); }, 100); });
document.getElementById('ctx-move').addEventListener('click', () => {
  if (!ctxNoteId) return;
  const note = state.notes.find(n => n.id === ctxNoteId);
  if (!note) return;
  const folderNames = state.folders.map(f => `${f.icon} ${f.name}`).join('\n');
  const target = prompt('Move to folder (type name):\n' + folderNames);
  if (!target) return;
  const match = state.folders.find(f => f.name.toLowerCase() === target.trim().toLowerCase());
  if (match) { note.folderId = match.id; note.modified = Date.now(); save(); render(); showToast('Moved to ' + match.name); }
  else showToast('Folder not found');
});

// ── VOICE TO TEXT ──
let recognition = null;
const voiceBtn = document.getElementById('voice-btn');
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-US';
  let isRecording = false;
  let finalTranscript = '';
  recognition.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' '; }
    if (finalTranscript) { document.execCommand('insertText', false, finalTranscript); finalTranscript = ''; scheduleSave(); }
  };
  recognition.onend = () => { voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎙 Voice'; isRecording = false; };
  voiceBtn.addEventListener('click', () => {
    if (!state.activeNoteId) { showToast('Open a note first'); return; }
    isRecording = !isRecording;
    if (isRecording) { recognition.start(); voiceBtn.classList.add('recording'); voiceBtn.textContent = '⏹ Stop'; }
    else recognition.stop();
  });
} else { voiceBtn.addEventListener('click', () => showToast('Voice not supported in this browser')); }

// ── MOBILE ──
document.getElementById('mobile-nav-btn').addEventListener('click', openSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
document.getElementById('back-btn').addEventListener('click', () => { commitEditorToNote(); closeEditor(); });
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('visible'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('visible'); }

// ── TOAST ──
let toastTimeout;
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.classList.remove('show'), 2400); }

// ── UNDO BAR ──
let undoBarTimeout;
function showUndoBar(msg) { document.getElementById('undo-msg').textContent = msg; document.getElementById('undo-bar').classList.add('show'); clearTimeout(undoBarTimeout); undoBarTimeout = setTimeout(hideUndoBar, 5000); }
function hideUndoBar() { document.getElementById('undo-bar').classList.remove('show'); }
document.getElementById('undo-btn').addEventListener('click', undoDelete);

// ── PWA INSTALL ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-banner').classList.add('visible'); });
document.getElementById('install-btn').addEventListener('click', async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; deferredPrompt = null; document.getElementById('install-banner').classList.remove('visible'); if (outcome === 'accepted') showToast('PixelNotes installed! 🎉'); });
document.getElementById('dismiss-install').addEventListener('click', () => document.getElementById('install-banner').classList.remove('visible'));

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }

// ── FULL RENDER ──
function render() {
  renderFolders(); renderAllTags(); renderNotesList();
  const note = state.notes.find(n => n.id === state.activeNoteId);
  if (note) renderNoteFolderSelect(note);
  updateSortUI();
  applyHomeView();
}

// ── BOOT ──
load(); applyTheme(); updateSortUI();

if (state.notes.length === 0) {
  const welcome = { id: uid(), title: 'Welcome to PixelNotes 👋', body: `<h2>Private. Offline. Yours.</h2><p>Everything stays on <strong>your device only</strong>. No tracking, no backdoors, no cloud unless you choose it. Your notes cannot be accessed by anyone else.</p><ul><li>Toolbar stays visible while you scroll ✓</li><li>Tap <strong>☑</strong> for perfectly aligned checklists ✓</li><li>Choose your sort order from the ⇅ menu ✓</li><li>Search highlights stay inside the note ✓</li><li>New tag = new folder created automatically ✓</li><li>Toggle Folders/All Notes view in the sidebar ✓</li><li>Customize folders with any emoji ✓</li></ul>`, folderId: state.folders[0]?.id || 'personal', tags: ['welcome'], created: Date.now(), modified: Date.now() };
  const todo = { id: uid(), title: 'Try a Checklist', body: `<div class="checklist-item"><input type="checkbox"><span>Tap ☑ in toolbar to add checklist items</span></div><div class="checklist-item"><input type="checkbox"><span>Notice perfect alignment</span></div><div class="checklist-item"><input type="checkbox"><span>Try voice to text with 🎙</span></div><div class="checklist-item"><input type="checkbox"><span>Add a #tag below to auto-create a folder</span></div>`, folderId: state.folders[0]?.id || 'personal', tags: ['todo'], created: Date.now()-1000, modified: Date.now()-1000 };
  state.notes.push(welcome, todo); save();
}

render();
</script>
